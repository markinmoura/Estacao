<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberPro - Gestão de Serviços</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS INTEGRADO */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #f97316;
            --text: #f8fafc;
            --input-bg: #f1f5f9;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        /* Estilo do Modal */
        .modal {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            margin: 50px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--input-bg);
            color: #1e293b;
            box-sizing: border-box;
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn-save:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Lista de Serviços */
        #listaServicos { margin-top: 2rem; }
        .service-item {
            background: var(--card-bg);
            padding: 1rem;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="modal">
        <h3>Novo Serviço</h3>
        <form id="servicoForm">
            <div class="form-group">
                <label>Nome do Serviço *</label>
                <input type="text" id="nomeServico" required placeholder="Ex: Corte Degradê">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Valor (R$) *</label>
                    <input type="number" id="valorServico" required placeholder="35">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Duração (min) *</label>
                    <input type="number" id="duracaoServico" required placeholder="30">
                </div>
            </div>

            <div class="form-group">
                <label>Categoria</label>
                <select id="categoriaServico">
                    <option value="Corte">Corte</option>
                    <option value="Barba">Barba</option>
                    <option value="Combo">Combo</option>
                </select>
            </div>

            <button type="submit" id="btnSalvar" class="btn-save">Salvar Serviço</button>
        </form>
    </div>

    <h2>Meus Serviços</h2>
    <div id="listaServicos">
        </div>
</div>

<script>
    /* JAVASCRIPT INTEGRADO COM LOCALSTORAGE */
    const form = document.getElementById('servicoForm');
    const btnSalvar = document.getElementById('btnSalvar');
    const listaDisplay = document.getElementById('listaServicos');

    // 1. Carregar dados ao abrir a página
    document.addEventListener('DOMContentLoaded', carregarServicos);

    // 2. Função para salvar novo serviço
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Efeito visual de carregamento
        btnSalvar.innerText = "Salvando...";
        btnSalvar.disabled = true;

        const novoServico = {
            id: Date.now(),
            nome: document.getElementById('nomeServico').value,
            valor: document.getElementById('valorServico').value,
            duracao: document.getElementById('duracaoServico').value,
            categoria: document.getElementById('categoriaServico').value
        };

        // Simula um delay de rede (opcional, apenas para estética)
        setTimeout(() => {
            const servicos = JSON.parse(localStorage.getItem('barber_servicos') || '[]');
            servicos.push(novoServico);
            localStorage.setItem('barber_servicos', JSON.stringify(servicos));

            form.reset();
            btnSalvar.innerText = "Salvar Serviço";
            btnSalvar.disabled = false;
            
            carregarServicos();
        }, 600);
    });

    // 3. Função para renderizar a lista
    function carregarServicos() {
        const servicos = JSON.parse(localStorage.getItem('barber_servicos') || '[]');
        
        if (servicos.length === 0) {
            listaDisplay.innerHTML = '<p style="text-align:center; opacity:0.5;">Nenhum serviço cadastrado ainda.</p>';
            return;
        }

        listaDisplay.innerHTML = servicos.map(s => `
            <div class="service-item">
                <div>
                    <strong>${s.nome}</strong><br>
                    <small>${s.categoria} • ${s.duracao} min</small>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span>R$ ${s.valor}</span>
                    <button class="delete-btn" onclick="excluirServico(${s.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    // 4. Função para excluir
    function excluirServico(id) {
        if(confirm("Tem certeza que deseja remover este serviço?")) {
            let servicos = JSON.parse(localStorage.getItem('barber_servicos') || '[]');
            servicos = servicos.filter(s => s.id !== id);
            localStorage.setItem('barber_servicos', JSON.stringify(servicos));
            carregarServicos();
        }
    }
</script>

</body>
</html>
